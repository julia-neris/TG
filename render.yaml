services:
  # ================================================
  # FRONTEND - React/Vite (Site Estático - GRATUITO)
  # ================================================
  - type: web
    name: sinfonia-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://JuliaNeris0017-sinfonia-backend.hf.space
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  